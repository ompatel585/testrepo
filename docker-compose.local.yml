services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env.docker
    depends_on:
      - db

  db:
    image: postgres:17
    ports:
      - '${HOST_DB_PORT:-5433}:5432'
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - '${DB_DUMP_PATH}:/docker-entrypoint-initdb.d/init.sql:ro'

  redis:
    image: redis:8
    ports:
      - '${REDIS_PORT:-6379}:6379'
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    restart: unless-stopped
